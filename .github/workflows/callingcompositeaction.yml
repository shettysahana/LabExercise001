name: calling composite function from another repository named hello-world-composite-action

on: [push]

jobs:
 helloworld_job:
   runs-on: ubuntu-latest
   name: Job to say hello 
   steps:
    - uses: actions/checkout@v4
  
    - id: hello
      uses: shettysahana/hello-world-composite-action@3265b83fdd2123637065d27f2f81bd0ee190335f
      with:
        who-to-greet: "Mona the Octocat"
    - run: echo random-number "$RANDOM_NUMBER"
      shell: bash
      env:
        RANDOM_NUMBER: ${{ steps.hello.outputs.random-number }}