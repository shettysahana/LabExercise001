# This workflow will build and push a .NET Core app to an Azure Web App when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure App Service web app.
# For instructions see https://docs.microsoft.com/en-us/azure/app-service/quickstart-dotnetcore?tabs=net60&pivots=development-environment-vscode
#
# To configure this workflow:
#
# 1. Download the Publish Profile for your Azure Web App. You can download this file from the Overview page of your Web App in the Azure Portal.
#    For more information: https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions?tabs=applevel#generate-deployment-credentials
#
# 2. Create a secret in your repository named AZURE_WEBAPP_PUBLISH_PROFILE, paste the publish profile contents as the value of the secret.
#    For instructions on obtaining the publish profile see: https://docs.microsoft.com/azure/app-service/deploy-github-actions#configure-the-github-secret
#
# 3. Change the value for the AZURE_WEBAPP_NAME. Optionally, change the AZURE_WEBAPP_PACKAGE_PATH and DOTNET_VERSION environment variables below.
#
# For more information on GitHub Actions for Azure: https://github.com/Azure/Actions
# For more information on the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples

name: Build and deploy ASP.Net Web API app to an Azure Web App

env:
  AZURE_WEBAPP_NAME: your-app-name    # set this to the name of your Azure Web App
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '5'                 # set this to the .NET Core version to use
  WORKING_DIRECTORY_PATH: 'WebAPI' # set this to the path to your web app project, defaults to the repository root
  ARTIFACT_NAME: 'dotnet-backend-api' # set this to the name of the artifact to be uploaded

on:
  push:
    branches: [ "feature*" ]
  workflow_dispatch:

# permissions:
#   contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
           echo "PUBLISH_DIRECTORY_PATH=backend/publish" >> $GITHUB_ENV
           echo "PROJECT_PATH=${{ env.WORKING_DIRECTORY_PATH }}/WebAPI.csproj" >> $GITHUB_ENV
     
  
      - name: Set build number
        run: |
          # echo "GITHUB_ENV=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
          # echo "GITHUB_ENV=${GITHUB_ENV}" >> $GITHUB_ENV
          # echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}" >> $GITHUB_ENV
          # echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=v1.0.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Show build number
        run: |
            echo "Build number is $BUILD_NUMBER"
            echo "PROJECT_PATH is $PROJECT_PATH"

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # - name: Set up dependency caching for faster builds
      #   uses: actions/cache@v3
      #   with:
      #     path: ~/.nuget/packages
      #     key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore $PROJECT_PATH

      - name: Build with dotnet
        run: dotnet build $PROJECT_PATH --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish $PROJECT_PATH -c Release -o $PUBLISH_DIRECTORY_PATH 

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: ${ { env.ARTIFACT_NAME } }
          path: $PUBLISH_DIRECTORY_PATH
          if-no-files-found: error

  deploy:
    # permissions:
    #   contents: none
    runs-on: ubuntu-latest
    needs: build
    # environment:
    #   name: 'Development'
    #   url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      # - name: Deploy to Azure Web App
      #   id: deploy-to-webapp
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #     package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
