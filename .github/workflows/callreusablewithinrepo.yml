name: call reusable workflow within repository and outside repository

on: 
 pull_request:
  branches:
  - develop
  - main
   

jobs:
  call-reusable-workflow-outside-repo:
   uses: octo-org/example-repo/.github/workflows/workflow-A.yml@v1

  call-reusable-workflow:
    permissions:
      contents: read
      pull-requests: write

    uses: ./.github/workflows/sampleresuableworkflow.yml
    with:
      config-path: '.github/labeler.yml'
    secrets:
     token: ${{ secrets.GITHUB_TOKEN }}


  job1:
    uses: ./.github/workflows/sampleresuableworkflow.yml
  
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
    - name: Print first and second words
      run: |
         echo "First word from job1: ${{ needs.job1.outputs.output1 }}"
         echo "Second word from job1: ${{ needs.job1.outputs.output2 }}"