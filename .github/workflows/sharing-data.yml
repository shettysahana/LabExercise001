name: sharing data between jobs

on: [push]

jobs: 
 job1:
   name: Add 3 and 7
   runs-on: ubuntu-latest
   steps:
    - shell: bash
      run: |
        echo "Adding 3 and 7"
        result=$((3 + 7))
        echo "result=$result" > math-homework.txt
    - name: Upload result as artifact
      uses: actions/upload-artifact@v4
      with:
        name: homework-pre
        path: math-homework.txt

 job2: 
   name: multiply by 9 
   runs-on: ubuntu-latest
   needs: job1
   steps:
    - name: Download result artifact
      uses: actions/download-artifact@v4
      with:
        name: homework-pre
    - shell: bash
      run: |
        echo "Multiplying result by 9"
        result=$(cat math-homework.txt | cut -d '=' -f2)
        result=$((result * 9))
        echo "result=$result" > math-homework.txt
    - name: Upload result as artifact
      uses: actions/upload-artifact@v4
      with:
        name: homework-post
        path: math-homework.txt

 job3:
  name: display result
  runs-on: ubuntu-latest
  needs: job2
  steps:
  - name: download math result for job 2 
    uses: actions/download-artifact@v5
    with:
        name: homework-post
  - name: Print the final result 
    shell: bash 
    run: |
        result=$(cat math-homework.txt | cut -d '=' -f2)
        echo "The final result is: $result"