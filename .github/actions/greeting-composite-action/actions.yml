name: 'Greeting'
description: 'A composite action that greets a user and generates a random number.'
inputs:
  who-to-greet: #id of input 
   description: 'The name of the person to greet'
   required: true
   default: 'World'
outputs:
  random-number:
    description: 'A random number between 0 and 100'
    value: ${{ steps.generate-random-number.outputs.random-number }} # The value of this output will be set in the run step below

runs:
  using: 'composite'
  steps:
   - name: 'Greet the user'
     run: echo "Hello ${{ inputs.who-to-greet }}!"
   
   - name: 'Generate a random number'
     id: generate-random-number
     run: |
         RANDOM_NUMBER=$((RANDOM % 101))
         echo "Generated random number: $RANDOM_NUMBER"
         echo "random-number=$RANDOM_NUMBER" >> $GITHUB_OUTPUT
     shell: bash

   - name: Set GitHub Path
     run: echo "$GITHUB_ACTION_PATH" >> $GITHUB_PATH
     shell: bash
     env:
       GITHUB_ACTION_PATH: ${{ github.action_path }}

   - name: Run goodbye.sh
     run: goodbye.sh
     shell: bash